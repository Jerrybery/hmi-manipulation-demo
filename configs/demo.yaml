sim:
  mjcf: assets/mujoco_menagerie/universal_robots_ur5e/scene.xml
  ee_site: attachment_site
  home_keyframe: home
  control_hz: 100
  substeps: 5

trajectory:
  center: [0.5, 0.0, 0.3]
  radius: 0.15
  omega: 0.6

ik:
  damping: 0.05
  kp: 0.5

camera:
  device: 0
  width: 640
  height: 480
  fps: 30

gesture:
  hold_frames: 5
  enable_palm_check: true

recovery:
  mode: return_home              # or resume_in_place
  return_duration_s: 1.5

ui:
  sim_view_size: [640, 480]
  cam_view_size: [320, 240]
