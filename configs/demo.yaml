sim:
  mjcf: assets/ur5e_gripper/scene.xml
  ee_site: attachment_site
  home_keyframe: home
  control_hz: 100
  substeps: 5

trajectory:
  center: [0.5, 0.0, 0.3]
  radius: 0.15
  omega: 0.6

trajectory_preview:
  horizon_s: 2.0
  n_samples: 20
  sphere_radius: 0.012
  alpha: 0.5
  color_near: [0.1, 0.9, 0.2]
  color_far: [0.85, 0.75, 0.15]

ik:
  damping: 0.05
  kp: 0.5

gripper:
  open_ctrl: 0
  close_ctrl: 255

camera:
  device: 0
  width: 640
  height: 480
  fps: 30

gesture:
  hold_frames: 5
  enable_palm_check: true
  enable_fist_resume: true

recovery:
  mode: return_home              # or resume_in_place
  return_duration_s: 1.5
  unload_pose: [0.0, -1.5708, 1.5708, -1.5708, 0.0, 0.0]
  unload_duration_s: 1.5
  gripper_release_duration_s: 0.5

ui:
  sim_view_size: [640, 480]
  cam_view_size: [320, 240]
